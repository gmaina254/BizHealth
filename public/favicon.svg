<?xml version="1.0" encoding="UTF-8"?>
<!-- Finance-themed favicon: simple coin + bar-chart / dollar mark, scalable SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00b894" />
      <stop offset="1" stop-color="#006b4f" />
    </linearGradient>
  </defs>
  <!-- circular coin background -->
  <circle cx="50" cy="50" r="48" fill="url(#g)" stroke="#013220" stroke-width="2" />

  <!-- bar chart bars -->
  <rect x="28" y="52" width="6" height="18" rx="1" fill="#ffffffcc" />
  <rect x="38" y="44" width="6" height="26" rx="1" fill="#ffffffcc" />
  <rect x="48" y="36" width="6" height="34" rx="1" fill="#ffffffcc" />
  <rect x="58" y="28" width="6" height="42" rx="1" fill="#ffffffcc" />

  <!-- dollar sign overlay -->
  <g transform="translate(22,14) scale(0.9)" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M30 22c0-6 10-6 10-12s-10-6-10-12" />
    <path d="M40 78c0 6-10 6-10 12s10 6 10 12" />
    <path d="M40 10v80" />
  </g>
</svg>
